name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, suffix: "" }
          - { goos: darwin,  goarch: arm64, suffix: "" }
          - { goos: windows, goarch: amd64, suffix: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "-X main.version=${{ github.ref_name }}" -o clinban${{ matrix.suffix }} ./cmd/clinban
      - name: Rename
        run: mv clinban${{ matrix.suffix }} clinban-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
      - name: Checksum
        run: sha256sum clinban-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} > clinban-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}.sha256
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            clinban-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
            clinban-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}.sha256
